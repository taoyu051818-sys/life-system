<section class="card nested">
  <h3>Due Cards</h3>
  <form class="row-form" method="get" action="/anki">
    <input type="hidden" name="limit" value="{{ limit or 100 }}" />
    <input type="hidden" name="due_limit" value="{{ due_limit or 50 }}" />
    {% if deck_filter %}<input type="hidden" name="deck" value="{{ deck_filter }}" />{% endif %}
    <a class="btn small ghost" href="/anki?limit={{ limit or 100 }}&due_limit={{ due_limit or 50 }}{% if deck_filter %}&deck={{ deck_filter }}{% endif %}{% if draft_select_all %}&draft_select=all{% endif %}&due_select=all">全选</a>
    <a class="btn small ghost" href="/anki?limit={{ limit or 100 }}&due_limit={{ due_limit or 50 }}{% if deck_filter %}&deck={{ deck_filter }}{% endif %}{% if draft_select_all %}&draft_select=all{% endif %}&due_select=none">取消全选</a>
  </form>

  <form id="review-form" class="row-form" hx-post="/anki/batch-review" hx-target="#anki-panel" hx-swap="outerHTML">
    <input type="hidden" name="deck_filter" value="{{ deck_filter or '' }}" />
    <input type="hidden" name="limit" value="{{ limit or 100 }}" />
    <input type="hidden" name="due_limit" value="{{ due_limit or 50 }}" />
    <input type="hidden" name="draft_select_mode" value="{% if draft_select_all %}all{% else %}none{% endif %}" />
    <input type="hidden" name="due_select_mode" value="{% if due_select_all %}all{% else %}none{% endif %}" />
    <label for="rating">rating</label>
    <select id="rating" name="rating">
      <option value="again">again</option>
      <option value="hard">hard</option>
      <option value="good" selected>good</option>
      <option value="easy">easy</option>
    </select>
    <button class="btn" type="submit">批量复习选中 due cards</button>
  </form>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>pick</th><th>card_id</th><th>deck</th><th>front</th><th>state</th><th>due_at</th><th>interval</th><th>ease</th>
        </tr>
      </thead>
      <tbody>
        {% for c in due_cards %}
        <tr>
          <td><input type="checkbox" name="card_id" value="{{ c.id }}" form="review-form" {% if due_select_all %}checked{% endif %}/></td>
          <td>{{ c.id }}</td>
          <td>{{ c.deck or '-' }}</td>
          <td class="content">{{ c.front }}</td>
          <td>{{ c.state }}</td>
          <td>{{ c.due_at | bj_time }}</td>
          <td>{{ c.interval_days }}</td>
          <td>{{ c.ease_factor }}</td>
        </tr>
        {% else %}
        <tr><td colspan="8" class="muted">no due cards</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
