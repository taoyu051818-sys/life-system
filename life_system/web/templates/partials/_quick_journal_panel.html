<div id="quick-journal-panel">
  {% if flash %}
  <div class="flash">{{ flash }}</div>
  {% endif %}

  <div class="quick-grid">
    <form class="stack-form" hx-post="/quick-journal/activity" hx-target="#quick-journal-panel" hx-swap="outerHTML">
      <label>Activity</label>
      <input name="content" placeholder="记录当前动作..." />
      <button class="btn small" type="submit">记 activity</button>
    </form>

    <form class="stack-form" hx-post="/quick-journal/reflection" hx-target="#quick-journal-panel" hx-swap="outerHTML">
      <label>Reflection</label>
      <input name="content" placeholder="记录反思..." />
      <button class="btn small" type="submit">记 reflection</button>
    </form>

    <form class="stack-form" hx-post="/quick-journal/win" hx-target="#quick-journal-panel" hx-swap="outerHTML">
      <label>Win</label>
      <input name="content" placeholder="记录小胜利..." />
      <button class="btn small" type="submit">记 win</button>
    </form>
  </div>

  <div class="focus-bar">
    <span>快速 checkin (focus):</span>
    <button class="btn small ghost" hx-post="/quick-journal/checkin" hx-vals='{"focus":"1"}' hx-target="#quick-journal-panel" hx-swap="outerHTML">1 很难专注</button>
    <button class="btn small ghost" hx-post="/quick-journal/checkin" hx-vals='{"focus":"2"}' hx-target="#quick-journal-panel" hx-swap="outerHTML">2 比较分散</button>
    <button class="btn small ghost" hx-post="/quick-journal/checkin" hx-vals='{"focus":"3"}' hx-target="#quick-journal-panel" hx-swap="outerHTML">3 一般</button>
    <button class="btn small ghost" hx-post="/quick-journal/checkin" hx-vals='{"focus":"4"}' hx-target="#quick-journal-panel" hx-swap="outerHTML">4 比较专注</button>
    <button class="btn small ghost" hx-post="/quick-journal/checkin" hx-vals='{"focus":"5"}' hx-target="#quick-journal-panel" hx-swap="outerHTML">5 高度专注</button>
  </div>
</div>
