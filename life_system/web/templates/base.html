<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Life System Web{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css" />
    <script src="/static/js/htmx.min.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Life System</div>
      <nav class="nav">
        <a class="{% if request.url.path == '/' %}active{% endif %}" href="/">首页</a>
        <a class="{% if request.url.path.startswith('/inbox') %}active{% endif %}" href="/inbox">Inbox Review</a>
        <a class="{% if request.url.path.startswith('/tasks') %}active{% endif %}" href="/tasks">Tasks</a>
        <a class="{% if request.url.path.startswith('/reminders') %}active{% endif %}" href="/reminders">Reminders</a>
        <a class="{% if request.url.path.startswith('/journal') %}active{% endif %}" href="/journal">Journal</a>
        <a class="{% if request.url.path.startswith('/anki') and not request.url.path.startswith('/anki/review') %}active{% endif %}" href="/anki">Anki</a>
        <a class="{% if request.url.path.startswith('/anki/review') %}active{% endif %}" href="/anki/review">Anki Review</a>
      </nav>
      <div class="user-chip">用户: {{ active_user }}</div>
      {% if logged_in %}
      <form method="post" action="/logout">
        <button class="btn small ghost" type="submit">退出</button>
      </form>
      {% endif %}
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
